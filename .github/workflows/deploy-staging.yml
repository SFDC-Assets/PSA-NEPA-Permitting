name: Deploy to Staging

on:
  push:
    branches: [main]
    paths:
      - 'force-app/**'
      - 'sfdx-project.json'

jobs:
  deploy:
    name: Deploy to staging org
    runs-on: ubuntu-latest
    environment: staging
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache npm global
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-sf-cli-2.x

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli@2

      - name: Authenticate to staging (JWT)
        env:
          SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
        run: |
          printf '%s' "$SF_JWT_KEY" > server.key
          sf org login jwt \
            --client-id "$SF_CLIENT_ID" \
            --jwt-key-file server.key \
            --username "$SF_USERNAME" \
            --instance-url "$SF_INSTANCE_URL" \
            --alias staging \
            --set-default
          rm -f server.key

      - name: Deploy to staging
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org staging \
            --test-level RunLocalTests \
            --wait 30 \
            --json | tee deploy-result.json

      - name: Upload deployment report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-staging-report
          path: deploy-result.json
          retention-days: 30
