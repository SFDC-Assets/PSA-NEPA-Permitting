<template>
    <lightning-card title="CEQ Export" icon-name="standard:file">
        <div class="slds-card__body slds-card__body_inner">
            <template if:true={error}>
                <p class="slds-text-color_error">{error}</p>
            </template>
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Generating export..." size="small"></lightning-spinner>
            </template>
            <template if:false={isLoading}>
                <div class="slds-grid slds-gutters slds-wrap">
                    <div class="slds-col">
                        <p class="slds-text-body_small slds-m-bottom_x-small">
                            Exports this process in CEQ Data Standard v1.2 JSON format for
                            MFR compliance reporting and submission to the CEQ permitting dashboard.
                        </p>
                    </div>
                </div>
                <div class="slds-grid slds-gutters slds-m-top_small">
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-button
                            label="Export This Process"
                            title="Export CEQ Data Standard JSON for this process"
                            onclick={handleExportProcess}
                            variant="brand"
                            disabled={isLoading}>
                        </lightning-button>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <lightning-button
                            label="Export All Active"
                            title="Export CEQ Data Standard JSON for all active processes"
                            onclick={handleExportAll}
                            variant="neutral"
                            disabled={isLoading}>
                        </lightning-button>
                    </div>
                </div>
                <template if:true={successMessage}>
                    <p class="slds-text-body_small slds-m-top_small slds-text-color_success">
                        {successMessage}
                    </p>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
